<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trae Skill Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex">
    <aside id="sidebar" class="w-72 bg-slate-800/80 border-r border-slate-700/50 min-h-screen p-4 flex flex-col transition-all duration-300">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <img src="avatar.png" alt="Logo" class="w-12 h-12 rounded-full border-2 border-blue-500/30">
                <div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                        Skill Browser
                    </h1>
                    <p class="text-xs text-slate-500">Trae 技能库</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-700 rounded-lg transition-all">
                <i class="fas fa-chevron-left text-slate-500"></i>
            </button>
        </div>
        
        <div id="sidebarExpanded" class="flex-1 flex flex-col transition-all duration-300">
            <div id="categoryList" class="flex-1 overflow-y-auto space-y-2">
                <!-- 分类列表将动态生成 -->
            </div>
            
            <div class="mt-6 pt-4 border-t border-slate-700/50 space-y-2">
                <button id="langToggle" onclick="toggleLang()" class="w-full px-4 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-language"></i>
                    <span>EN</span>
                </button>
                <button id="settingsBtn" onclick="showSettings()" class="w-full px-4 py-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-sm transition-all flex items-center justify-center gap-2 text-slate-300">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </button>
            </div>
        </div>
    </aside>
    
    <div id="sidebarCollapsed" class="hidden w-16 bg-slate-800/80 border-r border-slate-700/50 min-h-screen p-3 flex flex-col items-center">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-700 rounded-lg transition-all mb-4">
            <i class="fas fa-chevron-right text-slate-500"></i>
        </button>
        <div id="collapsedCategories" class="flex-1 space-y-3 overflow-y-auto">
            <!-- 收缩状态下的分类图标 -->
        </div>
        <button onclick="showSettings()" class="p-2 hover:bg-slate-700 rounded-lg transition-all mt-4 text-slate-500">
            <i class="fas fa-cog"></i>
        </button>
    </div>
    
    <main class="flex-1 p-8 overflow-y-auto">
        <div id="mainContent">
            <div class="max-w-4xl mx-auto mb-8">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="搜索技能、功能或关键词..." 
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl pl-12 pr-6 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-lg">
                </div>
            </div>

            <div id="loading" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
                <p class="mt-4 text-slate-500">正在扫描技能库...</p>
            </div>

            <div id="skillsGrid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 技能卡片将在这里动态生成 -->
            </div>

            <div id="emptyState" class="hidden text-center py-20">
                <div class="max-w-md mx-auto p-8 rounded-3xl bg-slate-800/50 border border-slate-700/50">
                    <div class="w-20 h-20 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-500 mx-auto mb-6">
                        <i class="fas fa-folder-open text-4xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-4">未找到任何技能</h2>
                    <p class="text-slate-400 mb-8">当前配置的目录中没有找到技能文件，请检查目录设置是否正确。</p>
                    <button onclick="showSettings()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-600/20">
                        前往设置目录
                    </button>
                </div>
            </div>
        </div>

        <!-- 设置界面 -->
        <div id="settingsView" class="hidden max-w-2xl mx-auto">
            <div class="mb-8 flex items-center gap-4">
                <button onclick="hideSettings()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 class="text-3xl font-bold">系统设置</h2>
            </div>
            
            <div class="space-y-6">
                <div class="p-8 rounded-3xl bg-slate-800/50 border border-slate-700/50">
                    <label class="block text-sm font-medium text-slate-400 mb-4">Skill 文件夹路径</label>
                    <div class="flex gap-4">
                        <input type="text" id="skillsDirInput" placeholder="例如: D:/AI Agent/Skill" 
                            class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <button onclick="saveSettings()" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all">
                            保存修改
                        </button>
                    </div>
                    <p class="mt-4 text-xs text-slate-500">
                        <i class="fas fa-info-circle mr-1"></i>
                        请确保该路径下包含名为 SKILL.md 的技能定义文件。
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
